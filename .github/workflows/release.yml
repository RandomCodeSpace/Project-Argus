name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Base beta version to release (e.g., v0.0.5-beta)'
        required: true

jobs:
  release:
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-release.yml@main
    permissions:
      contents: write
    with:
      version: ${{ inputs.version }}
