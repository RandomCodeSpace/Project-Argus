{{ template "base" . }}

{{ define "content" }}
<div class="flex flex-col gap-8 animate-in fade-in duration-500">
    <header>
        <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Overview</h1>
        <p class="text-slate-400 text-sm">Real-time telemetry and observability metrics.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="glass p-6 hover:border-indigo-500/50 transition-colors">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Traces</h3>
                <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
            </div>
            <div class="text-4xl font-bold text-white tracking-tight">{{ .Stats.TotalTraces }}</div>
        </div>
        <div class="glass p-6 hover:border-cyan-500/50 transition-colors">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Logs</h3>
                <div class="p-2 bg-cyan-500/10 rounded-lg text-cyan-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </div>
            </div>
            <div class="text-4xl font-bold text-white tracking-tight">{{ .Stats.TotalLogs }}</div>
        </div>
        <div class="glass p-6 hover:border-emerald-500/50 transition-colors">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Time Series</h3>
                <div class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>
                </div>
            </div>
            <div class="text-4xl font-bold text-white tracking-tight">{{ .Stats.TotalTimeSeries }}</div>
        </div>
        <div class="glass p-6 hover:border-purple-500/50 transition-colors">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Storage Used</h3>
                <div class="p-2 bg-purple-500/10 rounded-lg text-purple-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
                </div>
            </div>
            <div class="text-4xl font-bold text-white tracking-tight">{{ printf "%.2f" .Stats.DBSizeMb }} <span class="text-xl text-slate-500 font-medium">MB</span></div>
        </div>
    </div>
</div>
{{ end }}
