{{template "header" .}}

<style>
.filter-btn:hover  { background:var(--border-hover) !important; color:var(--text-secondary) !important; }
.filter-btn.active { background:var(--nav-active-bg) !important; color:var(--nav-active-text) !important; border-color:var(--border-strong) !important; }
.svc-input { background:var(--bg-panel);border:1px solid var(--border-hover);color:var(--text-secondary);font-size:.75rem;padding:.35rem .6rem .35rem 1.75rem;border-radius:7px;width:12rem;outline:none; }
.svc-input::placeholder { color:var(--text-dim); }
.svc-input:focus { border-color:var(--border-strong); }
.svc-zbtn { width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;background:var(--bg-panel);border:1px solid var(--border-hover);color:var(--text-muted);font-size:.9rem;cursor:pointer; }
.svc-zbtn:hover { color:var(--text-secondary); }
</style>

<div style="position:absolute;inset:0;display:flex">

    <!-- Graph Canvas -->
    <div style="position:relative;overflow:hidden;display:flex;flex-direction:column;width:100%;background:var(--bg-base)">

        <!-- Toolbar -->
        <div class="flex items-center gap-3 px-4 py-3 flex-shrink-0 z-10" style="background:var(--bg-panel);border-bottom:1px solid var(--border)">
            <!-- Search -->
            <div class="relative">
                <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5" style="color:var(--text-muted)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
                </svg>
                <input id="svc-search" type="text" placeholder="Filter services…" class="svc-input" oninput="applyFilter()"/>
            </div>

            <!-- Health tabs -->
            <div class="flex gap-1">
                <button class="filter-btn active" data-filter="all"      onclick="setFilter('all')"      style="font-size:.72rem;padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border-hover);background:var(--nav-active-bg);color:var(--nav-active-text);cursor:pointer">All</button>
                <button class="filter-btn"        data-filter="healthy"  onclick="setFilter('healthy')"  style="font-size:.72rem;padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer">
                    <span style="width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px"></span>Healthy
                </button>
                <button class="filter-btn"        data-filter="degraded" onclick="setFilter('degraded')" style="font-size:.72rem;padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer">
                    <span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;margin-right:4px"></span>Degraded
                </button>
                <button class="filter-btn"        data-filter="critical" onclick="setFilter('critical')" style="font-size:.72rem;padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer">
                    <span style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:4px"></span>Critical
                </button>
            </div>

            <div class="flex-1"></div>

            <!-- Summary stats -->
            <div style="display:flex;align-items:center;gap:.75rem;font-size:.7rem;color:var(--text-dim);padding-right:.75rem;margin-right:.25rem;border-right:1px solid var(--border)">
                <span>Health <span id="sum-health"    style="color:var(--text-secondary);font-weight:600;margin-left:.2rem;font-family:ui-monospace,monospace">—</span></span>
                <span>Services <span id="sum-services" style="color:var(--text-secondary);font-weight:600;margin-left:.2rem;font-family:ui-monospace,monospace">—</span></span>
                <span>Latency <span id="sum-latency"  style="color:var(--text-secondary);font-weight:600;margin-left:.2rem;font-family:ui-monospace,monospace">—</span></span>
                <span>Errors <span id="sum-error"     style="color:var(--text-secondary);font-weight:600;margin-left:.2rem;font-family:ui-monospace,monospace">—</span></span>
            </div>

            <span id="node-count"    style="font-size:.7rem;color:var(--text-muted);background:var(--bg-panel);padding:.2rem .6rem;border-radius:20px;border:1px solid var(--border-hover);font-family:ui-monospace,monospace">—</span>
            <span id="refresh-badge" style="font-size:.7rem;color:var(--text-dim)">Loading…</span>

            <!-- Zoom controls -->
            <div style="display:flex;gap:.25rem">
                <button onclick="zoomBy(1.25)" title="Zoom in"  class="svc-zbtn">+</button>
                <button onclick="zoomBy(0.8)"  title="Zoom out" class="svc-zbtn">−</button>
                <button onclick="fitScreen()"  title="Fit"      class="svc-zbtn" style="font-size:.75rem">⊡</button>
            </div>
            <button onclick="fetchGraph()" style="font-size:.72rem;color:var(--text-muted);background:var(--bg-panel);padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border-hover);cursor:pointer" onmouseover="this.style.color='var(--text-secondary)'" onmouseout="this.style.color='var(--text-muted)'">↺</button>
        </div>

        <!-- SVG -->
        <div class="flex-1 relative overflow-hidden" id="svg-wrap">
            <svg id="graph-svg" class="w-full h-full" style="cursor:grab">
                <g id="graph-root"></g>
            </svg>

            <!-- Legend -->
            <div style="position:absolute;bottom:1rem;left:1rem;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:.6rem .85rem;font-size:.65rem;color:var(--text-muted);pointer-events:none;opacity:.9">
                <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem"><span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block"></span>Healthy</div>
                <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem"><span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;display:inline-block"></span>Degraded</div>
                <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem"><span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block"></span>Critical</div>
                <div style="border-top:1px solid var(--border);padding-top:.4rem;color:var(--text-faint)">Scroll to zoom · Drag to pan</div>
            </div>

            <!-- Zoom badge -->
            <div id="zoom-badge" style="position:absolute;bottom:1rem;right:1rem;font-size:.65rem;color:var(--text-dim);background:var(--bg-panel);padding:.2rem .5rem;border-radius:4px;border:1px solid var(--border);pointer-events:none;font-family:ui-monospace,monospace">100%</div>
        </div>
    </div>
</div>

<!-- Service Detail Modal -->
<div id="svc-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" onclick="closeModal(event)">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)"></div>
    <div style="position:relative;background:var(--bg-panel);border:1px solid var(--border-hover);border-radius:16px;width:100%;max-width:22rem;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.6)" onclick="event.stopPropagation()">

        <!-- Header -->
        <div style="display:flex;align-items:center;gap:.75rem;padding:.85rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0">
            <div id="detail-avatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#000;flex-shrink:0"></div>
            <div style="min-width:0;flex:1">
                <div id="detail-name" style="font-weight:700;color:var(--text-primary);font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
                <div id="detail-status" style="font-size:.65rem;margin-top:.15rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em"></div>
            </div>
            <button onclick="closeModal()" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--bg-card);border:1px solid var(--border-hover);color:var(--text-muted);cursor:pointer;flex-shrink:0">
                <svg style="width:12px;height:12px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Body -->
        <div style="overflow:auto;flex:1;padding:1rem">
            <div style="display:grid;gap:.85rem">

                <!-- Health bar -->
                <div>
                    <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-muted);margin-bottom:.4rem">
                        <span>Health Score</span><span id="detail-health-val" style="color:var(--text-secondary);font-family:ui-monospace,monospace;font-weight:600"></span>
                    </div>
                    <div style="background:var(--bg-card);border-radius:4px;height:4px">
                        <div id="detail-health-bar" style="height:4px;border-radius:4px;transition:width .5s"></div>
                    </div>
                </div>

                <!-- Metrics grid -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">
                    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.65rem .85rem">
                        <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:.3rem">Avg Latency</div>
                        <div id="detail-latency" style="font-size:1rem;font-weight:700;color:var(--text-secondary);font-family:ui-monospace,monospace"></div>
                    </div>
                    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.65rem .85rem">
                        <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:.3rem">P99 Latency</div>
                        <div id="detail-p99" style="font-size:1rem;font-weight:700;color:var(--text-secondary);font-family:ui-monospace,monospace"></div>
                    </div>
                    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.65rem .85rem">
                        <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:.3rem">Error Rate</div>
                        <div id="detail-error-rate" style="font-size:1rem;font-weight:700;font-family:ui-monospace,monospace"></div>
                    </div>
                    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.65rem .85rem">
                        <div style="font-size:.6rem;color:var(--text-dim);margin-bottom:.3rem">Req / s</div>
                        <div id="detail-rps" style="font-size:1rem;font-weight:700;color:var(--text-secondary);font-family:ui-monospace,monospace"></div>
                    </div>
                </div>

                <!-- Spans -->
                <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.6rem .85rem">
                    <span style="font-size:.75rem;color:var(--text-muted)">Spans (1h)</span>
                    <span id="detail-spans" style="font-weight:600;color:var(--text-secondary);font-family:ui-monospace,monospace;font-size:.8rem"></span>
                </div>

                <!-- Alerts -->
                <div id="detail-alerts-section" class="hidden">
                    <div style="font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:.4rem">Alerts</div>
                    <ul id="detail-alerts" style="display:grid;gap:.25rem"></ul>
                </div>

                <!-- Connections -->
                <div>
                    <div style="font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:.4rem">Connections</div>
                    <div id="detail-connections" style="display:grid;gap:.3rem"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ── Theme helper — reads CSS variables at call time ───────────────────────────
function tv(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#888';
}

// ── State ─────────────────────────────────────────────────────────────────────
let allNodes = [], allEdges = [], visNodes = [], selectedId = null;
let pos = {};
let view = { x:0, y:0, scale:1 };
let filterStatus = 'all', filterText = '';
let dragging=false, dragId=null, dragOX=0, dragOY=0;
let panning=false, panSX=0, panSY=0;
let refreshTimer=null, cd=5;
let simRunning = false;

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchGraph() {
    clearInterval(refreshTimer);
    badge('Refreshing…');
    try {
        const r = await fetch('/api/system/graph');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        allNodes = d.nodes || [];
        allEdges = d.edges || [];
        updateSummary(d.system || {});
        applyFilter();
    } catch(e) { badge('⚠ ' + e.message); }
    startCd();
}

function badge(t) { document.getElementById('refresh-badge').textContent = t; }
function startCd() {
    cd = 5;
    refreshTimer = setInterval(() => { cd--; badge('↺ ' + cd + 's'); if(cd<=0) fetchGraph(); }, 1000);
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(f) {
    filterStatus = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter===f));
    applyFilter();
}

function applyFilter() {
    filterText = document.getElementById('svc-search').value.trim().toLowerCase();
    visNodes = allNodes.filter(n => {
        if (filterStatus !== 'all' && n.status !== filterStatus) return false;
        if (filterText && !n.id.toLowerCase().includes(filterText)) return false;
        return true;
    });
    const visIds = new Set(visNodes.map(n => n.id));
    const { W, H } = svgSize();
    visNodes.forEach((n, i) => {
        if (!pos[n.id]) {
            const angle = i * 2.39996;
            const radius = 18 * Math.sqrt(i + 1);
            pos[n.id] = { x: W/2 + radius*Math.cos(angle), y: H/2 + radius*Math.sin(angle), vx:0, vy:0 };
        }
    });
    const total = allNodes.length, shown = visNodes.length;
    document.getElementById('node-count').textContent =
        shown === total ? total + ' services' : shown + ' / ' + total + ' services';
    if (!simRunning) runSim();
    render();
}

// ── Simulation ────────────────────────────────────────────────────────────────
function runSim() {
    simRunning = true;
    const STEPS = 80;
    let step = 0;
    function tick() {
        if (step >= STEPS) { simRunning = false; return; }
        simulateStep();
        step++;
        if (step % 8 === 0) render();
        requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

function simulateStep() {
    const { W, H } = svgSize();
    const KR = 6000, KS = 0.02, RL = 130, DAMP = 0.80;
    const vn = visNodes;
    const vIds = new Set(vn.map(n => n.id));
    for (let i = 0; i < vn.length; i++) {
        for (let j = i+1; j < vn.length; j++) {
            const a = pos[vn[i].id], b = pos[vn[j].id];
            const dx = b.x-a.x, dy = b.y-a.y;
            const d2 = dx*dx+dy*dy+1;
            const f = KR/d2, d = Math.sqrt(d2);
            a.vx -= f*dx/d; a.vy -= f*dy/d;
            b.vx += f*dx/d; b.vy += f*dy/d;
        }
    }
    allEdges.forEach(e => {
        if (!vIds.has(e.source)||!vIds.has(e.target)) return;
        const a=pos[e.source], b=pos[e.target];
        const dx=b.x-a.x, dy=b.y-a.y, d=Math.max(Math.sqrt(dx*dx+dy*dy),1);
        const f=KS*(d-RL);
        a.vx+=f*dx/d; a.vy+=f*dy/d;
        b.vx-=f*dx/d; b.vy-=f*dy/d;
    });
    vn.forEach(n => {
        const p=pos[n.id];
        p.vx+=(W/2-p.x)*0.003; p.vy+=(H/2-p.y)*0.003;
        p.vx*=DAMP; p.vy*=DAMP;
        p.x=Math.max(50, Math.min(W-50, p.x+p.vx));
        p.y=Math.max(50, Math.min(H-50, p.y+p.vy));
    });
}

// ── View / Zoom / Pan ─────────────────────────────────────────────────────────
function svgSize() {
    const s = document.getElementById('graph-svg');
    return { W: s.clientWidth||800, H: s.clientHeight||600 };
}
function applyView() {
    document.getElementById('graph-root').setAttribute('transform',
        `translate(${view.x},${view.y}) scale(${view.scale})`);
    document.getElementById('zoom-badge').textContent = Math.round(view.scale*100) + '%';
}
function zoomBy(factor, cx, cy) {
    const { W, H } = svgSize();
    cx = cx ?? W/2; cy = cy ?? H/2;
    const newScale = Math.max(0.05, Math.min(8, view.scale * factor));
    view.x = cx - (cx - view.x) * (newScale / view.scale);
    view.y = cy - (cy - view.y) * (newScale / view.scale);
    view.scale = newScale;
    applyView();
}
function fitScreen() {
    if (visNodes.length === 0) return;
    const { W, H } = svgSize();
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    visNodes.forEach(n => {
        const p=pos[n.id]; if(!p) return;
        minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
        maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y);
    });
    const pw=maxX-minX+100, ph=maxY-minY+100;
    view.scale = Math.min(0.95, Math.min(W/pw, H/ph));
    view.x = W/2 - (minX+maxX)/2*view.scale;
    view.y = H/2 - (minY+maxY)/2*view.scale;
    applyView();
}

document.getElementById('graph-svg').addEventListener('wheel', e => {
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    zoomBy(e.deltaY < 0 ? 1.12 : 0.89, e.clientX-rect.left, e.clientY-rect.top);
}, { passive: false });

document.getElementById('graph-svg').addEventListener('mousedown', e => {
    if (e.target.closest('.svc-node')) return;
    panning=true; panSX=e.clientX-view.x; panSY=e.clientY-view.y;
    e.currentTarget.style.cursor='grabbing';
});
document.addEventListener('mousemove', e => {
    if (!panning) return;
    view.x=e.clientX-panSX; view.y=e.clientY-panSY;
    applyView();
});
document.addEventListener('mouseup', () => {
    panning=false;
    document.getElementById('graph-svg').style.cursor='grab';
});

// ── Colours ───────────────────────────────────────────────────────────────────
function nodeCol(n) {
    if (n.status==='critical') return {fill:'#450a0a',ring:'#ef4444',text:'#fca5a5',label:'#f87171'};
    if (n.status==='degraded') return {fill:'#451a03',ring:'#f59e0b',text:'#fcd34d',label:'#fbbf24'};
    return {fill:'#052e16',ring:'#10b981',text:'#6ee7b7',label:'#34d399'};
}
function edgeCol(e) {
    if (e.status==='critical'||(e.error_rate||0)>0.10) return '#f87171';
    if (e.status==='degraded'||(e.error_rate||0)>0.01) return '#fbbf24';
    return '#818cf8';
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
    const root = document.getElementById('graph-root');
    const { W, H } = svgSize();
    const R = visNodes.length > 80 ? 14 : visNodes.length > 40 ? 18 : 22;
    const showLabel    = view.scale > (visNodes.length > 80 ? 0.5 : 0.3);
    const showEdgeLabel = view.scale > 0.7 && visNodes.length <= 100;
    const vIds = new Set(visNodes.map(n => n.id));

    // Read theme colors at render time
    const gridStroke  = tv('--border');
    const labelColor  = tv('--text-muted');
    const edgeLabelBg = tv('--bg-panel');

    let h = `<defs>
        <pattern id="grid" width="${40/view.scale}" height="${40/view.scale}" patternUnits="userSpaceOnUse"
                 patternTransform="translate(${view.x % (40/view.scale)},${view.y % (40/view.scale)})">
            <path d="M ${40/view.scale} 0 L 0 0 0 ${40/view.scale}" fill="none" stroke="${gridStroke}" stroke-width="${0.5/view.scale}" stroke-opacity="0.6"/>
        </pattern>
        <marker id="an" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#818cf8" opacity="0.7"/></marker>
        <marker id="aw" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#fbbf24"/></marker>
        <marker id="ac" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#f87171"/></marker>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>`;

    // Edges
    allEdges.forEach(e => {
        if (!vIds.has(e.source)||!vIds.has(e.target)) return;
        const a=pos[e.source], b=pos[e.target]; if(!a||!b) return;
        const dx=b.x-a.x, dy=b.y-a.y, dist=Math.max(Math.sqrt(dx*dx+dy*dy),1);
        const sx=a.x+(dx/dist)*(R+1), sy=a.y+(dy/dist)*(R+1);
        const ex=b.x-(dx/dist)*(R+7), ey=b.y-(dy/dist)*(R+7);
        const col=edgeCol(e);
        const mid=col==='#f87171'?'ac':col==='#fbbf24'?'aw':'an';
        const isSel=selectedId&&(e.source===selectedId||e.target===selectedId);
        const mx=(sx+ex)/2, my=(sy+ey)/2;
        h+=`<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}"
                stroke="${col}" stroke-width="${isSel?2:1}" stroke-opacity="${isSel?0.8:0.3}"
                marker-end="url(#${mid})"/>`;
        if (showEdgeLabel && (e.avg_latency_ms||0) > 0) {
            h+=`<rect x="${mx-20}" y="${my-7}" width="40" height="12" rx="2" fill="${edgeLabelBg}" fill-opacity="0.85"/>
                <text x="${mx}" y="${my+2}" text-anchor="middle" font-size="8" fill="${col}" font-family="monospace">${(e.avg_latency_ms).toFixed(0)}ms</text>`;
        }
    });

    // Nodes
    visNodes.forEach(n => {
        const p=pos[n.id]; if(!p) return;
        const c=nodeCol(n);
        const isSel=n.id===selectedId;
        const abbr=n.id.substring(0,2).toUpperCase();
        const health=Math.round((n.health_score||0)*100);
        h+=`<g class="svc-node" data-id="${n.id}" style="cursor:pointer">`;
        if (isSel) h+=`<circle cx="${p.x}" cy="${p.y}" r="${R+8}" fill="${c.ring}" fill-opacity="0.1"/>
                       <circle cx="${p.x}" cy="${p.y}" r="${R+4}" fill="none" stroke="${c.ring}" stroke-width="1.5" stroke-dasharray="3 2" stroke-opacity="0.7"/>`;
        h+=`<circle cx="${p.x}" cy="${p.y}" r="${R}" fill="${c.fill}" stroke="${c.ring}" stroke-width="${isSel?2:1.5}"
                ${isSel?'filter="url(#glow)"':''}/>`;
        if (R >= 18) {
            h+=`<text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle"
                    font-size="${R > 18 ? 10 : 8}" font-weight="700" fill="${c.text}" font-family="monospace">${abbr}</text>`;
        } else {
            h+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${c.ring}" opacity="0.9"/>`;
        }
        if (showLabel) {
            h+=`<text x="${p.x}" y="${p.y+R+11}" text-anchor="middle" font-size="9"
                    fill="${labelColor}" font-family="sans-serif" pointer-events="none">${n.id}</text>`;
            if (R >= 18) {
                h+=`<text x="${p.x}" y="${p.y+R+21}" text-anchor="middle" font-size="8"
                    fill="${c.label}" font-family="monospace" pointer-events="none">${health}%</text>`;
            }
        }
        h+=`</g>`;
    });

    root.innerHTML = h;
    applyView();

    root.querySelectorAll('.svc-node').forEach(el => {
        const id = el.dataset.id;
        el.addEventListener('mousedown', e => startDrag(e, id));
        el.addEventListener('click',     e => { if(!dragging){ e.stopPropagation(); showPanel(id); }});
    });
}

// ── Drag node ─────────────────────────────────────────────────────────────────
function startDrag(e, id) {
    e.preventDefault(); e.stopPropagation();
    dragging=false; dragId=id;
    const svg=document.getElementById('graph-svg');
    const rect=svg.getBoundingClientRect();
    dragOX=(e.clientX-rect.left-view.x)/view.scale - pos[id].x;
    dragOY=(e.clientY-rect.top -view.y)/view.scale - pos[id].y;
    function onMove(ev) {
        dragging=true;
        const r=svg.getBoundingClientRect();
        pos[dragId].x=(ev.clientX-r.left-view.x)/view.scale-dragOX;
        pos[dragId].y=(ev.clientY-r.top -view.y)/view.scale-dragOY;
        pos[dragId].vx=0; pos[dragId].vy=0;
        render();
    }
    function onUp() {
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        setTimeout(()=>{dragging=false;},60);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
}

// ── Modal popup ───────────────────────────────────────────────────────────────
function showPanel(id) {
    const n=allNodes.find(x=>x.id===id); if(!n) return;
    selectedId=id; render();
    const m=n.metrics||{}, c=nodeCol(n);
    const health=(n.health_score||0)*100, errRate=(m.error_rate||0)*100;

    document.getElementById('detail-avatar').textContent=id.substring(0,2).toUpperCase();
    document.getElementById('detail-avatar').style.background=c.ring;
    document.getElementById('detail-name').textContent=id;
    const st=document.getElementById('detail-status');
    st.textContent=(n.status||'unknown').toUpperCase();
    st.style.color=n.status==='critical'?'#ef4444':n.status==='degraded'?'#f59e0b':'#22c55e';
    const bar=document.getElementById('detail-health-bar');
    bar.style.width=health.toFixed(0)+'%'; bar.style.background=c.ring;
    document.getElementById('detail-health-val').textContent=health.toFixed(0)+'%';
    document.getElementById('detail-latency').textContent=(m.avg_latency_ms||0).toFixed(1)+' ms';
    document.getElementById('detail-p99').textContent=(m.p99_latency_ms||0).toFixed(1)+' ms';
    document.getElementById('detail-rps').textContent=(m.request_rate_rps||0).toFixed(2)+' rps';
    const errEl=document.getElementById('detail-error-rate');
    errEl.textContent=errRate.toFixed(2)+'%';
    errEl.style.color=errRate>1?'#ef4444':errRate>0?'#f59e0b':'#22c55e';
    document.getElementById('detail-spans').textContent=(m.span_count_1h||0).toLocaleString();

    const alerts=n.alerts||[];
    const as=document.getElementById('detail-alerts-section');
    if(alerts.length>0){
        as.classList.remove('hidden');
        document.getElementById('detail-alerts').innerHTML=alerts.map(a=>
            `<li style="font-size:.72rem;color:#ef4444;background:#1a0505;border:1px solid #3a0a0a;padding:.35rem .6rem;border-radius:6px;display:flex;gap:.4rem;align-items:flex-start"><span>⚠</span>${a}</li>`
        ).join('');
    } else as.classList.add('hidden');

    const conns=allEdges.filter(e=>e.source===id||e.target===id);
    document.getElementById('detail-connections').innerHTML=conns.length===0
        ?`<div style="font-size:.72rem;color:var(--text-dim)">No connections</div>`
        :conns.map(e=>{
            const peer=e.source===id?e.target:e.source, dir=e.source===id?'→':'←', col=edgeCol(e);
            return `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:.45rem .7rem">
                <span style="font-size:.72rem;color:var(--text-secondary);font-weight:500">${dir} ${peer}</span>
                <div style="text-align:right">
                    <div style="font-family:ui-monospace,monospace;font-size:.7rem;font-weight:600;color:${col}">${(e.avg_latency_ms||0).toFixed(1)} ms</div>
                    <div style="font-size:.6rem;color:var(--text-dim)">${e.call_count||0} calls</div>
                </div></div>`;
        }).join('');

    document.getElementById('svc-modal').classList.remove('hidden');
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('svc-modal')) return;
    document.getElementById('svc-modal').classList.add('hidden');
    selectedId=null; render();
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function updateSummary(s) {
    document.getElementById('sum-health').textContent   =((s.overall_health_score||0)*100).toFixed(0)+'%';
    document.getElementById('sum-services').textContent =(s.healthy||0)+' healthy / '+(s.total_services||0);
    document.getElementById('sum-latency').textContent  =(s.avg_latency_ms||0).toFixed(1)+' ms';
    document.getElementById('sum-error').textContent    =((s.total_error_rate||0)*100).toFixed(2)+'%';
}

window.addEventListener('resize', () => render());
fetchGraph();
</script>
