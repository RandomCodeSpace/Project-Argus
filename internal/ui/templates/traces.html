{{template "header" .}}

<div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl">
        <h3 class="font-semibold text-gray-800">Recent Traces</h3>
    </div>
    
    <div class="flex-1 overflow-auto p-0">
        <table class="w-full text-left border-collapse min-w-max">
            <thead>
                <tr class="bg-white border-b border-gray-100 text-xs uppercase text-gray-500 sticky top-0">
                    <th class="px-6 py-3 font-medium">Trace ID</th>
                    <th class="px-6 py-3 font-medium">Root Service</th>
                    <th class="px-6 py-3 font-medium">Root Name</th>
                    <th class="px-6 py-3 font-medium">Start Time</th>
                    <th class="px-6 py-3 font-medium">Duration</th>
                    <th class="px-6 py-3 font-medium text-right">Action</th>
                </tr>
            </thead>
            <tbody class="text-sm divide-y divide-gray-100">
                {{range .Traces}}
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-3 text-gray-500 font-mono text-xs">{{.TraceID}}</td>
                    <td class="px-6 py-3 text-slate-700 font-medium">{{.ServiceName}}</td>
                    <td class="px-6 py-3 text-gray-700">{{.Name}}</td>
                    <td class="px-6 py-3 text-gray-500">{{.StartTime.Format "15:04:05.000"}}</td>
                    <td class="px-6 py-3 text-gray-700 font-medium">{{.Duration}}</td>
                    <td class="px-6 py-3 text-right">
                        <a href="/traces/{{.TraceID}}" class="text-blue-600 hover:text-blue-800 font-medium text-sm">View Details</a>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-gray-500">No traces found</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

{{template "footer" .}}
