{{template "header" .}}

<div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl">
        <h3 class="font-semibold text-gray-800">Log Explorer</h3>
        <form method="GET" action="/logs" class="flex gap-2">
            <input type="text" name="q" value="{{.Query}}" placeholder="Search logs..." class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
            <button type="submit" class="px-4 py-1.5 bg-slate-800 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition">Search</button>
        </form>
    </div>
    
    <div class="flex-1 overflow-auto p-0">
        <table class="w-full text-left border-collapse min-w-max">
            <thead>
                <tr class="bg-white border-b border-gray-100 text-xs uppercase text-gray-500 sticky top-0">
                    <th class="px-6 py-3 font-medium">Timestamp</th>
                    <th class="px-6 py-3 font-medium">Level</th>
                    <th class="px-6 py-3 font-medium">Service</th>
                    <th class="px-6 py-3 font-medium">Message</th>
                </tr>
            </thead>
            <tbody class="text-sm divide-y divide-gray-100">
                {{range .Logs}}
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-3 text-gray-500 whitespace-nowrap">{{.Timestamp.Format "2006-01-02 15:04:05"}}</td>
                    <td class="px-6 py-3">
                        <span class="px-2 py-1 rounded text-xs font-medium 
                            {{if eq .Severity "ERROR"}}bg-red-100 text-red-700
                            {{else if eq .Severity "WARN"}}bg-yellow-100 text-yellow-700
                            {{else}}bg-slate-100 text-slate-700{{end}}">
                            {{.Severity}}
                        </span>
                    </td>
                    <td class="px-6 py-3 text-slate-700 font-medium">{{.ServiceName}}</td>
                    <td class="px-6 py-3 text-gray-700 font-mono text-xs w-full">{{.Body}}</td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="4" class="px-6 py-12 text-center text-gray-500">No logs found</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

{{template "footer" .}}
